<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background Image</title>
    <style>
        .jakten{
            margin: 0;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .jakten1{
          background-image: url("jakten1.jpeg");
        }
        .jakten2{
            background-image: url("jakten2.jpeg");
        }
    </style>
</head>
<body>
  <div class="jakten jakten1"></div>
  <div class="jakten jakten2"></div>
</body>
</html>
